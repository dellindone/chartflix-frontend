<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0d0d0d"/>

  <!-- Outer circle -->
  <circle cx="32" cy="28" r="22" fill="none" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Candlestick 1 (leftmost) -->
  <line x1="17" y1="19" x2="17" y2="25" stroke="#c9a84c" stroke-width="1.2"/>
  <rect x="15" y="25" width="4" height="7" rx="0.5" fill="#c9a84c"/>
  <line x1="17" y1="32" x2="17" y2="36" stroke="#c9a84c" stroke-width="1.2"/>

  <!-- Candlestick 2 -->
  <line x1="24" y1="16" x2="24" y2="21" stroke="#c9a84c" stroke-width="1.2"/>
  <rect x="22" y="21" width="4" height="9" rx="0.5" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
  <line x1="24" y1="30" x2="24" y2="35" stroke="#c9a84c" stroke-width="1.2"/>

  <!-- Candlestick 3 -->
  <line x1="31" y1="20" x2="31" y2="24" stroke="#c9a84c" stroke-width="1.2"/>
  <rect x="29" y="24" width="4" height="8" rx="0.5" fill="#c9a84c"/>
  <line x1="31" y1="32" x2="31" y2="37" stroke="#c9a84c" stroke-width="1.2"/>

  <!-- Candlestick 4 -->
  <line x1="38" y1="17" x2="38" y2="22" stroke="#c9a84c" stroke-width="1.2"/>
  <rect x="36" y="22" width="4" height="10" rx="0.5" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
  <line x1="38" y1="32" x2="38" y2="38" stroke="#c9a84c" stroke-width="1.2"/>

  <!-- Diagonal trend line -->
  <line x1="14" y1="37" x2="44" y2="18" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="2,1.5" opacity="0.8"/>

  <!-- CHARTFLIX text -->
  <text x="32" y="57" font-family="Arial Black, sans-serif" font-size="7" font-weight="900" fill="#c9a84c" text-anchor="middle" letter-spacing="1.5">CHARTFLIX</text>
</svg>
